<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="game-wrapper">
    <div class="split-layout">
        <!-- Game Panel -->
        <div class="game-panel">
            <div class="mode-bar">
                <button class="mode-btn" data-mode="2player">2 Players</button>
                <button class="mode-btn active" data-mode="ai">vs AI</button>
                <div class="diff-group">
                    <button class="diff-change-btn" id="diffChangeBtn">
                        Change Difficulty: <span id="diffLabel">Medium</span>
                    </button>
                </div>
                <div class="ab-toggle">
                    <span>Alpha-Beta</span>
                    <input type="checkbox" id="alphaBetaToggle" checked>
                </div>
            </div>

            <div class="board" id="board"></div>

            <div class="turn-status" id="turnStatus">
                Your turn (X)
            </div>

            <div class="controls">
                <button id="resetBtn">Reset</button>
                <button id="newGameBtn" class="primary">New Game</button>
            </div>
            <div class="api-hint" id="apiHint">
                Backend: waiting for connection
            </div>
        </div>

        <!-- Analytics Panel -->
        <div class="analytics-panel" id="analyticsPanel">
            <div class="analytics-section">
                <div class="analytics-title">Game Summary</div>
                <div id="summaryArea" class="summary-box">—</div>
            </div>
            <div class="analytics-section">
                <div class="analytics-title">Search Metrics</div>
                <div id="metricsArea" class="metric-grid">—</div>
            </div>
            <div class="analytics-section">
                <div class="analytics-title">Move Evaluation</div>
                <div id="moveBreakdownArea" class="move-list">—</div>
            </div>
            <div class="analytics-section">
                <div class="analytics-title">AI Explanation</div>
                <div id="explanationArea" class="explanation-text">—</div>
            </div>
            <div class="analytics-section">
                <div class="analytics-title">Pruning Insight</div>
                <div id="pruningArea" class="explanation-text">—</div>
            </div>
        </div>
    </div>
</div>

<!-- Difficulty Picker Modal -->
<div class="diff-modal-overlay" id="diffModalOverlay">
    <div class="diff-modal" id="diffModal">
        <div class="diff-modal-title">Choose Difficulty</div>
        <div class="diff-modal-cards">

            <!-- Easy -->
            <div class="diff-card" data-difficulty="easy">
                <div class="diff-card-img-wrap">
                    <img src="easy.jpg" alt="Easy" class="diff-card-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="diff-card-placeholder" style="display:none;">
                        <span class="diff-placeholder-icon">😊</span>
                    </div>
                </div>
                <div class="diff-card-label">Neville</div>
                <div class="diff-card-sub">Easy — Depth 1</div>
            </div>

            <!-- Medium -->
            <div class="diff-card" data-difficulty="medium">
                <div class="diff-card-img-wrap">
                    <img src="medium.jpg" alt="Medium" class="diff-card-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="diff-card-placeholder" style="display:none;">
                        <span class="diff-placeholder-icon">🤔</span>
                    </div>
                </div>
                <div class="diff-card-label">Kara</div>
                <div class="diff-card-sub">Medium — Depth 3</div>
            </div>

            <!-- Hard -->
            <div class="diff-card" data-difficulty="hard">
                <div class="diff-card-img-wrap">
                    <img src="hard.jpg" alt="Hard" class="diff-card-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="diff-card-placeholder" style="display:none;">
                        <span class="diff-placeholder-icon">😈</span>
                    </div>
                </div>
                <div class="diff-card-label">Adrian</div>
                <div class="diff-card-sub">Hard — Full Search</div>
            </div>

        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
